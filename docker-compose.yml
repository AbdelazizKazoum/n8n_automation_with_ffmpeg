version: "3.8"

services:
  n8n:
    build: .
    image: n8n-with-ffmpeg
    container_name: n8n
    restart: always
    user: "root"
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - N8N_RESTRICT_FILE_ACCESS_TO=/data;/temp
      - N8N_ENABLE_EXECUTE_COMMAND=true
      - N8N_ENABLE_COMMAND_EXECUTION=true

    volumes:
      - ./n8n_data:/root/.n8n
      - ./assets:/data
      - ./temp:/temp
